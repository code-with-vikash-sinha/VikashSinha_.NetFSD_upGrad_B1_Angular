<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ecommerce Landing</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.hero{
background:#0d6efd;
color:white;
padding:80px 0;
text-align:center;
}
</style>

</head>

<body>

<!-- Navbar with Offcanvas -->

<nav class="navbar navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="#">ShopZone</a>

<button class="navbar-toggler" data-bs-toggle="offcanvas" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

</div>
</nav>

<!-- Offcanvas -->

<div class="offcanvas offcanvas-start" id="menu">

<div class="offcanvas-header">
<h5>Menu</h5>
<button class="btn-close" data-bs-dismiss="offcanvas"></button>
</div>

<div class="offcanvas-body">

<ul class="list-group">
<li class="list-group-item">Home</li>
<li class="list-group-item">Products</li>
<li class="list-group-item">Offers</li>
<li class="list-group-item">Contact</li>
</ul>

</div>
</div>

<!-- Hero Section -->

<section class="hero">

<div class="container">

<h1>Welcome to ShopZone</h1>

<p>Best deals on latest products</p>

<button class="btn btn-light">Shop Now</button>

</div>

</section>

<!-- Carousel -->

<div id="productCarousel" class="carousel slide" data-bs-ride="carousel">

<div class="carousel-inner">

<div class="carousel-item active">
<img src="https://picsum.photos/1200/400?1" class="d-block w-100">
</div>

<div class="carousel-item">
<img src="https://picsum.photos/1200/400?2" class="d-block w-100">
</div>

<div class="carousel-item">
<img src="https://picsum.photos/1200/400?3" class="d-block w-100">
</div>

</div>

<button class="carousel-control-prev" data-bs-target="#productCarousel" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" data-bs-target="#productCarousel" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>

<!-- Product Section -->

<div class="container my-5">

<h2 class="text-center mb-4">Featured Products</h2>

<div class="row g-4">

<div class="col-md-4 col-sm-6">
<div class="card h-100 shadow">
<img src="https://picsum.photos/300/200?4" class="card-img-top">
<div class="card-body">
<h5 class="card-title">Smart Watch</h5>
<p>$199</p>
<button class="btn btn-primary">Buy</button>
</div>
</div>
</div>

<div class="col-md-4 col-sm-6">
<div class="card h-100 shadow">
<img src="https://picsum.photos/300/200?5" class="card-img-top">
<div class="card-body">
<h5 class="card-title">Headphones</h5>
<p>$99</p>
<button class="btn btn-primary">Buy</button>
</div>
</div>
</div>

<div class="col-md-4 col-sm-6">
<div class="card h-100 shadow">
<img src="https://picsum.photos/300/200?6" class="card-img-top">
<div class="card-body">
<h5 class="card-title">Camera</h5>
<p>$499</p>
<button class="btn btn-primary">Buy</button>
</div>
</div>
</div>

</div>
</div>

<!-- Newsletter -->

<div class="bg-light py-5">

<div class="container text-center">

<h3>Subscribe Newsletter</h3>

<form class="row justify-content-center">

<div class="col-md-4">
<input type="email" class="form-control" placeholder="Enter Email">
</div>

<div class="col-auto">
<button class="btn btn-primary">Subscribe</button>
</div>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
