```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>College Event Dashboard</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container">
<a class="navbar-brand" href="#">College Events</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
<li class="nav-item"><a class="nav-link" href="#">Events</a></li>
<li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
</ul>
</div>
</div>
</nav>

<!-- Dashboard -->
<div class="container my-4">

<h2 class="mb-4">Event Dashboard</h2>

<div class="row g-4">

<!-- Event List -->
<div class="col-lg-8 col-md-12">
<div class="card shadow-sm">
<div class="card-header bg-dark text-white">
Upcoming Events
</div>

<ul class="list-group list-group-flush">
<li class="list-group-item d-flex justify-content-between">
Tech Fest
<span class="badge bg-success">25 July</span>
</li>

<li class="list-group-item d-flex justify-content-between">
Coding Competition
<span class="badge bg-warning">30 July</span>
</li>

<li class="list-group-item d-flex justify-content-between">
Cultural Night
<span class="badge bg-info">10 Aug</span>
</li>
</ul>
</div>
</div>

<!-- Add Event Section -->
<div class="col-lg-4 col-md-12">
<div class="card shadow-sm text-center p-3">

<h5>Add New Event</h5>

<button class="btn btn-primary mt-2" data-bs-toggle="modal" data-bs-target="#eventModal">
Add Event
</button>

</div>
</div>

</div>
</div>

<!-- Modal -->
<div class="modal fade" id="eventModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Add Event</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<form class="needs-validation" novalidate>

<div class="mb-3">
<label class="form-label">Event Name</label>
<input type="text" class="form-control" required>
<div class="invalid-feedback">Please enter event name</div>
</div>

<div class="mb-3">
<label class="form-label">Event Date</label>
<input type="date" class="form-control" required>
<div class="invalid-feedback">Please select date</div>
</div>

<div class="mb-3">
<label class="form-label">Event Location</label>
<input type="text" class="form-control" required>
<div class="invalid-feedback">Enter location</div>
</div>

<button class="btn btn-success w-100">Submit</button>

</form>

</div>

</div>
</div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Bootstrap validation
(() => {
'use strict'
const forms = document.querySelectorAll('.needs-validation')

Array.from(forms).forEach(form => {
form.addEventListener('submit', event => {
if (!form.checkValidity()) {
event.preventDefault()
event.stopPropagation()
}
form.classList.add('was-validated')
})
})
})()
</script>

</body>
</html>
```
